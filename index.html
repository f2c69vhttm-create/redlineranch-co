<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED LINE RANCH CO. | THE FRONTIER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <img src="logo-madre.png" alt="RLR Logo" class="nav-logo">
    </header>

    <section class="section-frontier">
        <div class="content-overlay">
            <h1 class="brand-title">RED LINE RANCH CO.</h1>
            <div class="red-line-separator"></div>
            <p class="tagline">"HEIRS OF THE EARTH: RESILIENCE AND TRADITION"</p>
            
            <div class="button-container">
                <a href="#productos" class="btn-primary">EXPLORAR COLECCIÓN</a>
            </div>
        </div>
    </section>

    <section id="productos" class="section-products">
        <h2 class="section-title">NUESTRAS PRENDAS</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="vaquero-ranch.jpg" alt="Camiseta Frontier">
                <h3>Frontier Classic Tee</h3>
                <p>Gildan Softstyle - Black</p>
            </div>
            </div>
    </section>

</body>
</html>
